  - id: "sh_two_phase_locking"
    type: "single_hop"
    question: "What is two-phase locking?"
    must_include_points: ["Growing and shrinking phases", "serializability", "does not guarantee deadlock freedom"]
    expected_answer: "Two-phase locking (2PL) is a concurrency control protocol that guarantees conflict serializability. It requires that each transaction's lock requests be divided into exactly two phases:
 
      1. **Growing phase**: The transaction may acquire locks but may not release any lock.
      2. **Shrinking phase**: The transaction may release locks but may not acquire any new lock.
 
      The point at which a transaction acquires its final lock is called its lock point. Transactions can be totally ordered by lock point, and this order is a valid serialization order, which is why 2PL guarantees conflict serializability.
 
      However, 2PL does not prevent deadlocks — two transactions each holding a lock the other needs can wait indefinitely. Deadlock detection or prevention must be added separately. Additionally, basic 2PL does not prevent cascading rollback: a transaction may release a lock and allow another to read its written but not-yet-committed data. The strict 2PL variant addresses this by holding all exclusive locks until commit."
    keywords: ["2PL", "growing phase", "shrinking phase", "serializable", "deadlock"]
    similarity_threshold: 0.72
    ideal_retrieved_chunks: [1094, 1079]

  - id: "sh_deadlock_state"
    type: "single_hop"
    question: "What defines a system in deadlock state?"
    must_include_points: ["Cycle of waiting transactions", "no progress possible"]
    expected_answer: "A system is in a deadlock state when there exists a set of transactions such that every transaction in the set is waiting for a data item (lock) held by another transaction in the set. Formally, there exist transactions T₀, T₁, ..., Tₙ such that T₀ is waiting for a data item held by T₁, T₁ is waiting for one held by T₂, and so on, with Tₙ waiting for a data item held by T₀ — forming a cycle. No transaction in this set can ever make progress, since each is blocked by another in the cycle.
 
      Deadlock is precisely described by a directed cycle in the wait-for graph, where an edge Tᵢ → Tⱼ indicates that Tᵢ is waiting for Tⱼ to release a data item. The only remedy is to roll back one or more transactions (victims) to release their locks and break the cycle, allowing the remaining transactions to proceed."
    keywords: ["deadlock", "waiting", "cycle", "rollback"]
    similarity_threshold: 0.70
    ideal_retrieved_chunks: [1103, 1108, 1110]

  - id: "sh_aries_recovery"
    type: "single_hop"
    question: "What is ARIES recovery?"
    must_include_points: ["Write-ahead logging", "analysis/redo/undo", "crash recovery"]
    expected_answer: "ARIES (Algorithm for Recovery and Isolation Exploiting Semantics) is the leading crash recovery algorithm for database systems, modeled on write-ahead logging. Its key innovation is the use of log sequence numbers (LSNs): each log record has a unique LSN, and each database page stores the LSN of the most recent log record applied to it (pageLSN).
 
      ARIES recovery after a crash proceeds in three phases:
      1. **Analysis**: Scan the log forward from the last checkpoint to reconstruct which pages were dirty (modified but not yet written to disk) and which transactions were active at the time of the crash.
      2. **Redo**: Scan the log forward from the log record corresponding to the earliest dirty page, replaying all logged operations to bring the database to its state at the moment of the crash. A log record's update is skipped if the page's pageLSN already equals or exceeds the log record's LSN, avoiding redundant work.
      3. **Undo**: Scan the log backward to roll back all transactions that were active at crash time. Each undo step writes a compensation log record (CLR), making the undo itself logged and idempotent (safe to redo if the system crashes again during recovery).
 
      ARIES also supports fuzzy checkpoints that record the dirty page table and active transaction table in the log without flushing dirty pages to disk, significantly reducing checkpoint overhead compared to simpler schemes."
    keywords: ["ARIES", "analysis", "redo", "undo", "WAL"]
    similarity_threshold: 0.72
    ideal_retrieved_chunks: [1242, 1208, 1210, 1205]

