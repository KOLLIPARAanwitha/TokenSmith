  - id: "mh_isolation_locking_recovery"
    type: "multi_hop"
    question: "How do isolation levels interact with lock-based protocols and recovery behavior under cascading rollback?"
    subqueries:
      - "Isolation levels and anomalies prevented."
      - "Lock-based protocol behavior (e.g., 2PL variants)."
      - "Cascading rollback / recoverability interaction."
    must_include_points: []
    expected_answer: "SQL defines four isolation levels — read uncommitted, read committed, repeatable read, and serializable — each permitting progressively fewer anomalies (dirty reads, nonrepeatable reads, phantom reads). These levels interact directly with lock-based concurrency control.
 
      Basic two-phase locking (2PL) ensures conflict serializability by splitting a transaction's lock activity into a growing phase (only acquisitions) and a shrinking phase (only releases). However, 2PL alone does not prevent cascading rollback: a transaction may release a lock and allow another transaction to read its written but not-yet-committed value. If the writer then aborts, all transactions that read its writes must also be rolled back — a cascading rollback.
 
      Strict 2PL addresses this by retaining all exclusive (write) locks until the transaction commits or aborts. This prevents any other transaction from reading uncommitted dirty data, making the schedule cascadeless. Rigorous 2PL goes further, holding both shared and exclusive locks until commit, which additionally ensures transactions serialize in commit order.
 
      Recovery algorithms (such as the one underlying ARIES) typically require strict 2PL: because undo of a transaction must not affect data already seen by committed transactions, exclusive locks must be held until commit. This means that the isolation level and the locking variant co-determine recoverability guarantees — serializable isolation implemented via strict 2PL is both conflict-serializable and cascadeless, while weaker levels (e.g., read committed implemented by releasing read locks early) can permit anomalies and complicate recovery."
    keywords: ["isolation", "2PL", "cascading rollback", "recoverable", "serializable"]
    similarity_threshold: 0.75
    ideal_retrieved_chunks: [1073, 1074, 1094, 1072, 1199]

  - id: "mh_2pl_to_snapshot_anomalies_recoverability"
    type: "multi_hop"
    question: "Compare strict 2PL, timestamp ordering, and snapshot isolation: which anomalies each prevents, and how that affects recoverability?"
    subqueries:
      - "Strict 2PL anomaly/recoverability properties."
      - "Timestamp ordering anomaly/recoverability properties."
      - "Snapshot isolation anomaly/recoverability properties."
    must_include_points: []
    expected_answer: "**Strict 2PL** guarantees conflict serializability by holding all exclusive locks until commit (and shared locks until end of growing phase in the strict variant). It prevents dirty reads, nonrepeatable reads, and — with predicate/gap locking — phantom reads. Because exclusive locks are held until commit, no transaction can read an uncommitted write, making schedules cascadeless and easily recoverable.
 
      **Timestamp ordering (TO)** assigns each transaction a unique timestamp at start and enforces that conflicting read/write operations occur in timestamp order; a transaction that violates ordering is rolled back and restarted with a new timestamp. This prevents dirty reads in practice (rolled-back transactions do not commit their writes), but unless additional mechanisms such as Thomas' write rule are applied, cascading rollback is possible if a transaction reads a value written by another that later aborts. TO ensures conflict serializability (via timestamp order) but can suffer high abort rates under contention.
 
      **Snapshot isolation (SI)** gives each transaction a consistent snapshot of committed data as of its start time. Reads never block and never see dirty (uncommitted) data, preventing dirty reads and nonrepeatable reads. However, SI permits write skew — two concurrent transactions each read a set of rows and update disjoint subsets in a way that no serial execution would allow — so SI is not fully serializable. Recoverability is preserved (only committed values are visible), but serializability requires serializable snapshot isolation (SSI) extensions.
 
      In summary: strict 2PL is fully serializable and cascadeless; timestamp ordering is serializable but may incur rollbacks and requires care for cascadelessness; snapshot isolation is recoverable and avoids many anomalies but is not serializable without SSI."
    keywords: ["strict 2PL", "timestamp ordering", "snapshot isolation", "anomalies", "recoverability"]
    similarity_threshold: 0.78
    ideal_retrieved_chunks: [1094, 1127, 1143, 1148, 1073, 1199]

  - id: "mh_workload_index_opt_buffer_tradeoff"
    type: "multi_hop"
    question: "If a workload has heavy joins and frequent updates, how should index design, query optimization plan choice, and buffer management be balanced?"
    subqueries:
      - "Index design for join-heavy update-heavy workloads."
      - "Query plan tradeoffs under workload characteristics."
      - "Buffer management impact."
    must_include_points: []
    expected_answer: "For a workload with heavy joins and frequent updates, the three components — indexing, query optimization, and buffer management — must be balanced carefully because choices in one area directly affect the others.
 
      **Index design**: B+-tree indices significantly accelerate indexed nested-loop joins and selective probes, but every update, insert, or delete requires index maintenance. In an update-heavy workload, maintaining many indices adds substantial write overhead. The recommendation is to index only the join attributes and highly selective predicates that benefit the most queries, and to avoid over-indexing. Clustered indices can reduce I/O for join probes, but only one clustering per relation is possible, and frequent updates can cause costly page splits.
 
      **Query plan selection**: The query optimizer evaluates join algorithms based on available buffer, relation sizes, and index availability. Hash join is typically best for large unsorted equijoins when sufficient buffer is available. Sort-merge join suits data that is already sorted or nearly so. Indexed nested-loop join is optimal when the inner relation has a selective index and the outer relation is small. With frequent updates, selectivity estimates may become stale, so statistics should be refreshed regularly.
 
      **Buffer management**: The buffer pool directly influences join performance. Block nested-loop join improves dramatically with more buffer pages (reducing passes). Hash join requires enough buffer to hold at least one partition in memory to avoid recursive partitioning. The database buffer manager uses strategies like LRU, but may apply MRU for sequential scans (to avoid polluting the buffer pool). Pinning pages during a join avoids repeated eviction and re-reading of inner relation blocks.
 
      In practice: prefer a small, well-chosen set of B+-tree indices on join keys; use the cost-based optimizer with up-to-date statistics to select the join algorithm; and allocate sufficient buffer to whichever join algorithm dominates the workload."
    keywords: ["joins", "updates", "index", "query optimization", "buffer management"]
    similarity_threshold: 0.75
    ideal_retrieved_chunks: [908, 909, 940, 937, 938, 918, 920, 926, 1000, 787, 780]

  - id: "mh_distributed_partition_replication_protocols"
    type: "multi_hop"
    question: "In distributed databases, how do partitioning and replication influence distributed commit/concurrency protocols and distributed query optimization?"
    subqueries:
      - "Partitioning effects."
      - "Replication effects."
      - "Impact on commit/concurrency protocol."
      - "Impact on distributed optimization."
    must_include_points: []
    expected_answer: "**Partitioning** splits a relation's tuples across nodes using strategies such as range, hash, or round-robin partitioning. This enables parallel query execution and data locality but means that queries spanning multiple partitions require distributed joins, aggregation, and — for updates — distributed transactions.
 
      **Replication** stores copies of data on multiple nodes, improving read throughput and fault tolerance. However, updates must be applied to all replicas consistently, introducing write synchronization costs. Approaches include primary-copy (all writes go to one master, propagated to secondaries) and quorum-based protocols.
 
      **Impact on distributed commit protocols**: Because a distributed transaction may access data on several nodes, atomicity requires a distributed commit protocol. Two-phase commit (2PC) is standard: the coordinator sends a `prepare` message to all participants, collects `ready` or `abort` votes, then commits or aborts globally. With replication, each replica of an updated relation must participate in (or be notified by) the commit protocol. Coordinator failure in 2PC can leave participants in a blocking state; consensus-based 2PC (e.g., using Paxos or Raft) eliminates this by replicating the coordinator's decision.
 
      **Impact on concurrency control**: Distributed concurrency control typically uses a distributed lock manager (one per node, cooperating) or timestamp ordering. With replication, a write must be globally ordered across replicas; primary-copy locking concentrates this at the master. Distributed snapshot isolation requires tracking commit timestamps across nodes.
 
      **Impact on query optimization**: The optimizer must consider data placement when building plans. Semijoins reduce inter-node data transfer: instead of shipping a full relation, a projection of join attributes is sent first, filtered at the remote site, and only matching tuples returned. Partition pruning eliminates nodes from execution when selection predicates match partition predicates, directly reducing both I/O and network cost."
    keywords: ["partitioning", "replication", "distributed commit", "concurrency", "optimization"]
    similarity_threshold: 0.75
    ideal_retrieved_chunks: [1319, 1321, 1334, 1456, 1457, 1460, 1473, 1432, 1446]

  - id: "mh_strict2pl_vs_to_serial_deadlock_recovery"
    type: "multi_hop"
    question: "Compare strict 2PL and timestamp ordering on conflict serializability, deadlocks, and recoverability."
    subqueries:
      - "Conflict serializability comparison."
      - "Deadlock behavior comparison."
      - "Recoverability comparison."
    must_include_points: []
    expected_answer: "**Conflict serializability**: Both protocols guarantee conflict-serializable schedules. Strict 2PL orders transactions by their lock points (the moment a transaction acquires its last lock); this ordering is a valid serialization order. Timestamp ordering enforces serializability by ensuring that all conflicting operations between any two transactions occur in timestamp order; a transaction that would violate this order is rolled back and restarted with a new timestamp.
 
      **Deadlocks**: Strict 2PL is susceptible to deadlocks. Because transactions block waiting for locks held by other transactions, circular wait chains can form. Systems using strict 2PL must implement deadlock detection (via a wait-for graph, checking for cycles) or deadlock prevention (wound-wait, wait-die schemes). Timestamp ordering is inherently deadlock-free: rather than blocking, a transaction that cannot proceed (because it would violate timestamp order) is immediately aborted and restarted. There is no waiting, so no circular dependency can form.
 
      **Recoverability**: Strict 2PL holds exclusive locks until commit, so no other transaction can read an uncommitted write. This makes strict 2PL cascadeless: if a transaction aborts, only it needs to be rolled back, not any dependents. Basic timestamp ordering does not inherently prevent a transaction from reading values written by another transaction that has not yet committed. If that writer later aborts, cascading rollback may result. Commit ordering or Thomas' write rule can be added to improve recoverability, but this requires care.
 
      In summary: strict 2PL is deadlock-prone but naturally cascadeless; timestamp ordering is deadlock-free but may require additional mechanisms to ensure cascadelessness."
    keywords: ["strict 2PL", "timestamp ordering", "serializability", "deadlock", "recoverability"]
    similarity_threshold: 0.80
    ideal_retrieved_chunks: [1094, 1127, 1103, 1073, 1199]

  - id: "mh_strict_vs_rigorous_2pl"
    type: "multi_hop"
    question: "Compare strict 2PL and rigorous 2PL in terms of lock release timing, recoverability guarantees, and concurrency."
    subqueries:
      - "Lock release timing."
      - "Recoverability/cascadeless behavior."
      - "Concurrency tradeoff."
    must_include_points: []
    expected_answer: "**Lock release timing**: In strict 2PL, a transaction holds all exclusive (write) locks until it commits or aborts, but it may release shared (read) locks during the shrinking phase before commit. In rigorous 2PL, a transaction holds all locks — both shared and exclusive — until it commits. Rigorous 2PL is thus a stricter variant.
 
      **Recoverability**: Both protocols guarantee cascadeless schedules because exclusive locks are held past commit, making it impossible for another transaction to read uncommitted data written by the lock holder. If a transaction aborts, only its own changes need to be undone; no cascading rollback occurs. Rigorous 2PL provides an additional property: because all locks are held until commit, the commit order directly defines a valid serialization order. This simplifies recovery reasoning and is particularly useful when integration with replication or logging requires a clear commit sequence.
 
      **Concurrency**: Strict 2PL provides somewhat higher concurrency than rigorous 2PL. By releasing shared locks before commit (while still in the shrinking phase under basic 2PL), other transactions can acquire read access to those data items sooner. Rigorous 2PL withholds even shared locks until commit, which can delay transactions that need to read data held by a long-running transaction, reducing throughput. In practice, rigorous 2PL is often preferred for its simplicity and stronger guarantees despite the concurrency cost."
    keywords: ["strict 2PL", "rigorous 2PL", "locks", "recoverability", "concurrency"]
    similarity_threshold: 0.76
    ideal_retrieved_chunks: [1094, 1073, 1199]

  - id: "mh_deadlock_prevention_vs_detection_tradeoff"
    type: "multi_hop"
    question: "How do deadlock prevention and deadlock detection/recovery differ in overhead, rollback behavior, and throughput tradeoffs?"
    subqueries:
      - "Overhead comparison."
      - "Rollback implications."
      - "Throughput implications."
    must_include_points: []
    expected_answer: "**Overhead**: Deadlock prevention imposes overhead on every lock request — each request must be checked against a global ordering or an age-based preemption rule (wound-wait or wait-die). This overhead is constant and per-operation. Deadlock detection adds overhead periodically when the system invokes the cycle-detection algorithm on the wait-for graph, plus the maintenance cost of updating the graph as transactions acquire and release locks. Under workloads with rare deadlocks, detection adds less overhead than prevention.
 
      **Rollback behavior**: Prevention schemes roll back transactions preemptively: in wait-die, a younger transaction that requests a lock held by an older one is aborted immediately (it 'dies'), even if the actual wait would not have led to a deadlock. In wound-wait, the older transaction preempts the younger one. These are conservative rollbacks. Detection-based recovery rolls back transactions only after a deadlock cycle is confirmed, choosing a victim based on cost (age, data items held, work done). This is reactive and potentially more targeted, but the victim may have done significant work.
 
      **Throughput tradeoffs**: Prevention can hurt throughput by aborting transactions unnecessarily, especially under high contention. However, it avoids the latency spike caused by a deadlock being detected (which may take seconds or more). Detection allows optimistic execution and only penalizes transactions when deadlocks actually occur, which can yield better throughput in workloads with infrequent deadlocks. However, under high-contention workloads, frequent deadlocks make detection costly. Both must guard against starvation: a repeatedly rolled-back transaction must eventually be allowed to proceed, typically by giving it priority after a rollback."
    keywords: ["deadlock prevention", "deadlock detection", "rollback", "overhead", "throughput"]
    similarity_threshold: 0.74
    ideal_retrieved_chunks: [1103, 1104, 1107, 1108, 1110]

  - id: "mh_wal_aries_checkpoint"
    type: "multi_hop"
    question: "How do write-ahead logging and ARIES interact with checkpoints during crash recovery?"
    subqueries:
      - "WAL requirement/order."
      - "ARIES analysis/redo/undo roles."
      - "Checkpoint role."
    must_include_points: []
    expected_answer: "**Write-ahead logging (WAL)** is the foundational requirement: before any data page modified by a transaction can be written to disk, the corresponding log record must be forced to stable storage. This ordering guarantee means that even if the system crashes immediately after writing a page, the log already contains the record needed to redo or undo that change. WAL also requires that all log records for a transaction be written to stable storage before the transaction commits (the commit log record must be durable before acknowledging commit).
 
      **ARIES** is the state-of-the-art recovery algorithm built on WAL. It uses log sequence numbers (LSNs) — monotonically increasing identifiers assigned to each log record — and stores the LSN of the most recent log record applied to each page (pageLSN) in the page itself. This allows ARIES to determine, for each page, exactly what has already been applied.
 
      ARIES recovery proceeds in three phases:
      1. **Analysis**: Scan the log forward from the last checkpoint to reconstruct the dirty page table (which pages were modified but not yet flushed at crash) and the transaction table (which transactions were active at crash).
      2. **Redo**: Scan forward from the log record corresponding to the earliest dirty page, replaying all logged operations. An operation is skipped if the page's pageLSN already reflects that update, avoiding redundant work.
      3. **Undo**: Scan backward through the log to undo all operations of transactions that were active at crash time, writing compensation log records (CLRs) so that the undo itself is logged and idempotent.
 
      **Checkpoints** reduce recovery time by bounding how far back in the log recovery must scan. ARIES supports fuzzy checkpoints: rather than flushing all dirty pages (which would be expensive), it records the current transaction table and dirty page table in the log at checkpoint time, then continues normal operation. This means recovery can start from the checkpoint LSN rather than the log's beginning, while the redo phase handles any dirty pages that were not flushed before the crash."
    keywords: ["WAL", "ARIES", "checkpoint", "redo", "undo", "recovery"]
    similarity_threshold: 0.76
    ideal_retrieved_chunks: [1242, 1205, 1208, 1209, 1210, 1216, 1218]

  - id: "mh_clustered_index_join_io"
    type: "multi_hop"
    question: "How does clustered indexing interact with join algorithm choice and disk I/O cost?"
    subqueries:
      - "Clustered index access pattern."
      - "Join algorithm dependence."
      - "I/O cost impact."
    must_include_points: []
    expected_answer: "A **clustered index** physically orders the data pages of a relation according to the index key. A scan or range lookup on the clustered attribute retrieves logically adjacent tuples in a small number of sequential I/Os. An unclustered index, by contrast, may require a separate random disk access per tuple, making large retrievals expensive.
 
      **Indexed nested-loop join**: For each tuple in the outer relation, the system probes the inner relation using the join attribute's index. If the inner relation has a clustering B+-tree on the join attribute, the matching tuples are physically contiguous; the cost of each probe is the B+-tree height plus a small number of block transfers. With a non-clustered index, each matching tuple may require a separate I/O, which can be very costly for large inner relations. For example, with a clustering index of height 4 and an average of one additional block access, the cost per outer tuple is 5 I/Os — far less than the potentially thousands of I/Os for an unclustered index over a large result.
 
      **Sort-merge join**: This algorithm merges two sorted inputs. If a relation is clustered on the join attribute, it is already sorted, and the merge phase can be done with a single linear scan of each relation — minimizing I/O. If sorting is required, an external sort must be performed first, adding significant I/O cost proportional to the number of merge passes.
 
      **Hash join**: Clustering provides less benefit for hash join, since the algorithm hashes tuples into partitions by join attribute value, scattering them regardless of physical order. Hash join's I/O cost is dominated by the partitioning phase (reading and writing each relation) and the probing phase. The main buffer management concern is having enough buffer frames to hold at least one complete partition in memory.
 
      In general, clustered indices reduce I/O most dramatically for indexed nested-loop joins and sort-merge joins on pre-sorted data; hash join is less sensitive to physical ordering."
    keywords: ["clustered index", "join", "I/O cost", "nested loop", "hash join", "sort-merge"]
    similarity_threshold: 0.72
    ideal_retrieved_chunks: [908, 909, 940, 937, 938, 916, 918, 920, 926]

  - id: "mh_2pc_vs_3pc_failures"
    type: "multi_hop"
    question: "Compare two-phase commit and three-phase commit under coordinator failure and network partition scenarios."
    subqueries:
      - "2PC behavior under failures."
      - "3PC behavior under failures."
      - "Blocking/availability tradeoff."
    must_include_points: []
    expected_answer: "**Two-phase commit (2PC)** works as follows: in phase 1, the coordinator sends a `prepare` message to all participants, who vote `ready` (flushing their log) or `abort`. In phase 2, if all participants voted ready, the coordinator logs `commit` and broadcasts it; otherwise it aborts. The critical problem arises when the coordinator fails after collecting ready votes but before broadcasting the decision: participants are in a \"ready\" state from which they cannot safely commit or abort unilaterally, because they do not know whether the coordinator committed. This leaves participants **blocked** until the coordinator recovers — a fundamental limitation of 2PC.
 
      **Three-phase commit (3PC)** inserts a `pre-commit` phase between voting and commit. Once all votes are ready, the coordinator sends `pre-commit` to all participants before sending the final `commit`. If the coordinator then fails, a new coordinator knows (from the `pre-commit` messages in the log) that the decision was `commit`, and can safely proceed. This makes 3PC **non-blocking under single coordinator failure**.
 
      However, 3PC is not resilient to **network partitions**. If a partition occurs after some participants receive `pre-commit` and others do not, different groups may reach different conclusions — one group commits and the other aborts — violating atomicity (split-brain). 2PC avoids this by being conservative (blocking rather than risking inconsistency).
 
      **Practical modern approach**: Consensus-based 2PC replicates the coordinator's decision using a protocol like Paxos or Raft. Even if the coordinator node fails, other replicas have the decision in their log and can complete the commit without blocking. This achieves non-blocking behavior without 3PC's partition vulnerability and is used in systems like Google Spanner."
    keywords: ["2PC", "3PC", "coordinator failure", "partition", "blocking"]
    similarity_threshold: 0.72
    ideal_retrieved_chunks: [1456, 1457, 1460, 1463, 1551, 1569]

