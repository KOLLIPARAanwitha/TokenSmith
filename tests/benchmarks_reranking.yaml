  - id: "sh_sql_aggregate_functions"
    type: "single_hop"
    question: "What are SQL aggregate functions?"
    must_include_points: ["Aggregation over sets/groups", "examples (SUM/AVG/MIN/MAX/COUNT)", "grouping context"]
    expected_answer: "SQL aggregate functions take a collection of values — either a set or a multiset — as input and return a single scalar value. SQL defines five standard built-in aggregate functions: `avg` (average), `min` (minimum), `max` (maximum), `sum` (total), and `count` (number of values).
 
      `sum` and `avg` require numeric input, while `min`, `max`, and `count` can operate on non-numeric data types such as strings. Aggregate functions are most commonly used in conjunction with `GROUP BY`: the query partitions tuples into groups based on one or more attributes, and the aggregate is computed independently within each group. The `HAVING` clause can then filter groups based on the aggregate result. `count(*)` counts all tuples including those with null attribute values, whereas `count(attribute)` ignores nulls for that attribute."
