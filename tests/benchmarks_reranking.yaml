evaluation_plan:
  research_question: "Does coverage-aware, constraint-based reranking improve multi-hop QA evidence coverage and answer quality?"
  baselines:
    - id: baseline_no_rerank
      description: "No reranking; retrieval output order is used directly."
      rerank_mode: "none"
    - id: baseline_cross_encoder
      description: "Standard cross-encoder reranking using ms-marco-MiniLM-L6-v2."
      rerank_mode: "cross_encoder"
    - id: candidate_coverage_constraints
      description: "Coverage-aware + constrained reranking."
      rerank_mode: "adaptive_multi_hop"

  answer_quality_rubric:
    scale: "0-2"
    dimensions:
      faithfulness:
        2: "All key claims are supported by retrieved chunks; no unsupported claims."
        1: "Mostly supported, but has minor unsupported/generalized claims."
        0: "Contains unsupported or hallucinated key claims."
      completeness:
        2: "Covers all required parts (all subqueries / required points)."
        1: "Partially covers required parts."
        0: "Misses most required parts."
      correctness:
        2: "Factually correct against textbook evidence."
        1: "Minor factual imprecision that does not change core conclusion."
        0: "One major or multiple factual errors."
    aggregate:
      formula: "quality_score_0_to_2 = 0.35*faithfulness + 0.30*completeness + 0.35*correctness"

  retrieval_metrics:
    - "subquery_coverage_at_k"
    - "relevant_chunk_recall_at_k"
    - "precision_at_k"
    - "page_diversity_at_k"
    - "latency_ms_total"
    - "latency_ms_rerank"

benchmarks:
  # ------------------------------
  # Multi-hop (seed + expansion)
